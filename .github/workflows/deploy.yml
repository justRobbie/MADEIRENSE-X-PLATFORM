name: Deploy to Hostinger KVM

on:
  push:
    branches: [staging]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      VITE_API_URL: ${{ secrets.VITE_API_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build shared code
        run: yarn build-shared-code

      - name: Build API and Web
        run: yarn concurrently "yarn workspace api build" "yarn workspace web build"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/madeirense
            git checkout staging
            git pull origin staging
            nvm use 22
            yarn install --frozen-lockfile --production
            DATABASE_URL="${{ secrets.DATABASE_URL }}" 
            pm2 reload ecosystem.config.js --env production || \
            pm2 start ecosystem.config.js --env production
            pm2 save

      - name: Sync web build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "packages/web/dist/*"
          target: "/var/www/madeirense/web/dist"
          strip_components: 3
